name: Build and Deploy to Azure Container Apps

on:
push:
branches:
- main

jobs:
build-and-deploy:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - name: Azure Login
    uses: azure/login@v1
    with:
      creds: ${{ secrets.AZURE_CREDENTIALS }}

  - name: Build and Push Image
    run: |
      az acr build \
        --registry fooddeliveryacr123 \
        --image restaurant-service:v1 \
        .

  - name: Deploy Container App
    run: |
      az containerapp create \
        --name restaurant-app \
        --resource-group food-rg \
        --environment food-env \
        --image fooddeliveryacr123.azurecr.io/restaurant-service:v1 \
        --target-port 5000 \
        --ingress external
