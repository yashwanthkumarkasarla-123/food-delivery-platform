<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Owner Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f4f7f6; color: #333; }
        h1 { color: #2c3e50; border-bottom: 2px solid #fc8019; padding-bottom: 10px; }
        #alerts-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .order-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-left: 8px solid #fc8019; position: relative; }
        .timer { font-size: 1.1rem; font-weight: bold; color: #e74c3c; margin: 10px 0; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-accept { background: #27ae60; color: white; }
        .btn-reject { background: #c0392b; color: white; }
        .no-orders { font-style: italic; color: #7f8c8d; text-align: center; grid-column: 1/-1; padding: 40px; }
    </style>
</head>
<body>

    <h1>Warangal Eats | Restaurant Alerts 🔔</h1>
    <div id="alerts-container">Connecting to server...</div>

    <script>
        const API_URL = 'https://restaurant-app.grayplant-35e8185c.centralus.azurecontainerapps.io';

        async function checkOrders() {
            try {
                // We call the specific manage-orders endpoint
                const res = await fetch(`${API_URL}/restaurant/manage-orders`);
                const orders = await res.json();
                const container = document.getElementById('alerts-container');

                if (!orders || orders.length === 0) {
                    container.innerHTML = '<div class="no-orders"><h3>No pending orders</h3><p>New orders will appear here automatically.</p></div>';
                    return;
                }

                container.innerHTML = orders.map(order => {
                    const timeElapsed = Math.floor(Date.now() / 1000 - order.created_at);
                    const timeLeft = Math.max(0, 300 - timeElapsed);
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;

                    return `
                        <div class="order-card">
                            <h3>Order #${order.order_id}</h3>
                            <p><strong>Items:</strong> ${order.items.map(i => i.name).join(', ')}</p>
                            <p><strong>Total:</strong> ₹${order.total || '0'}</p>
                            <div class="timer">⏳ Action Required: ${minutes}m ${seconds}s</div>
                            <div class="btn-group">
                                <button class="btn-accept" onclick="respond(${order.order_id}, 'ACCEPT')">ACCEPT</button>
                                <button class="btn-reject" onclick="respond(${order.order_id}, 'REJECT')">REJECT</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                document.getElementById('alerts-container').innerHTML = '<p style="color:red;">Error connecting to Azure. Please wake up the server.</p>';
            }
        }

        async function respond(orderId, action) {
            try {
                const res = await fetch(`${API_URL}/restaurant/action`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ order_id: orderId, action: action })
                });
                const data = await res.json();
                alert(data.message || "Order Updated");
                checkOrders(); 
            } catch (e) {
                alert("Action failed. Server might be down.");
            }
        }

        // Auto-refresh every 5 seconds
        setInterval(checkOrders, 5000);
        checkOrders();
    </script>
</body>
</html>
