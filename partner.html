<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Dashboard | Warangal Eats</title>
    <style>
        :root { 
            --swiggy-orange: #fc8019; 
            --p-green: #60b246; 
            --dark-blue: #282c3f; 
            --bg-gray: #f4f7f6; 
            --reject-red: #ff4757;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-gray); margin: 0; padding: 0; }
        
        .nav { 
            background: var(--dark-blue); color: white; padding: 15px 5%; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        .container { padding: 30px 5%; max-width: 1000px; margin: auto; }

        .order-card { 
            background: white; border-radius: 12px; padding: 25px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.05); margin-bottom: 20px; 
            display: flex; justify-content: space-between; align-items: center;
            border-left: 6px solid #ccc; transition: 0.3s;
        }

        .order-card.pending { border-left-color: var(--swiggy-orange); }
        .order-card.preparing { border-left-color: var(--p-green); }
        .order-card.ready { border-left-color: #3498db; }
        .order-card.rejected { border-left-color: var(--reject-red); opacity: 0.7; }

        .order-details h3 { margin: 0 0 10px 0; color: #333; }
        .order-details p { margin: 5px 0; color: #666; font-size: 14px; }
        
        .cod-badge { 
            background: #fff3e0; color: #e65100; padding: 2px 8px; 
            border-radius: 4px; font-weight: bold; font-size: 12px;
        }

        .status-tag { 
            display: inline-block; padding: 4px 10px; border-radius: 4px; 
            font-size: 11px; font-weight: bold; text-transform: uppercase;
            background: #eee; margin-left: 10px; color: #555;
        }

        .btn-group { display: flex; gap: 10px; }
        .btn { 
            padding: 12px 20px; border: none; border-radius: 8px; 
            cursor: pointer; font-weight: bold; color: white; transition: 0.2s;
        }
        .btn-accept { background: var(--swiggy-orange); }
        .btn-ready { background: var(--p-green); }
        .btn-reject { background: transparent; color: var(--reject-red); border: 1px solid var(--reject-red); font-size: 12px; }
        
        .empty-state { text-align: center; padding: 60px; color: #888; }
    </style>
</head>
<body>

<div class="nav">
    <div>
        <h2 id="res-name-display" style="margin:0">Restaurant Dashboard</h2>
        <small id="res-id-display" style="opacity: 0.7;">Online</small>
    </div>
    <button style="background:none; border:1px solid white; color:white; cursor:pointer; padding:5px 10px; border-radius:4px;" onclick="logout()">Logout</button>
</div>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h3 style="margin:0;">Kitchen Orders</h3>
        <span id="order-count">0 Orders</span>
    </div>
    
    <div id="orders-container">
        <div class="empty-state">Loading kitchen queue...</div>
    </div>
</div>

<script>
    const API_BASE = 'https://restaurant-app.grayplant-35e8185c.centralus.azurecontainerapps.io';
    const params = new URLSearchParams(window.location.search);
    const resId = params.get('res_id') || localStorage.getItem('active_res_id');

    if (!resId) {
        window.location.href = 'partner-login.html';
    } else {
        localStorage.setItem('active_res_id', resId);
    }

    async function fetchOrders() {
        try {
            const response = await fetch(`${API_BASE}/restaurant/manage-orders/${resId}`);
            const orders = await response.json();
            const container = document.getElementById('orders-container');
            document.getElementById('order-count').innerText = `${orders.length} Active`;

            if (orders.length === 0) {
                container.innerHTML = `<div class="empty-state"><h3>No active orders</h3></div>`;
                return;
            }

            container.innerHTML = orders.map(o => `
                <div class="order-card ${o.status.toLowerCase()}">
                    <div class="order-details">
                        <h3>Order #${o.order_id} <span class="status-tag">${o.status}</span></h3>
                        <p><strong>Customer:</strong> ${o.customer_name || 'Guest'}</p>
                        <p><strong>Items:</strong> ${o.items.map(i => i.name).join(', ')}</p>
                        <p><strong>Bill:</strong> ₹${o.total} <span class="cod-badge">COD</span></p>
                        <p style="font-size:12px; color:#999;">📍 ${o.delivery_address || 'Warangal'}</p>
                    </div>
                    <div class="btn-group">
                        ${renderActionButtons(o)}
                    </div>
                </div>
            `).join('');
        } catch (error) { console.error("Fetch error:", error); }
    }

    function renderActionButtons(order) {
        if (order.status === 'PENDING_RESTAURANT') {
            return `
                <button class="btn btn-reject" onclick="updateStatus(${order.order_id}, 'REJECT')">Reject</button>
                <button class="btn btn-accept" onclick="updateStatus(${order.order_id}, 'ACCEPT')">Accept</button>
            `;
        } else if (order.status === 'PREPARING') {
            // CRITICAL FIX: Sent 'MARK_READY' to match your Backend exactly
            return `<button class="btn btn-ready" onclick="updateStatus(${order.order_id}, 'MARK_READY')">Mark As Ready</button>`;
        } else if (order.status === 'READY_FOR_PICKUP') {
            return `<span style="color:var(--swiggy-orange); font-weight:bold;">⌛ Waiting for Rider</span>`;
        } else if (order.status === 'REJECTED') {
            return `<span style="color:red;">Order Rejected</span>`;
        }
        return `<span style="color:#888;">${order.status}</span>`;
    }

    async function updateStatus(orderId, action) {
        try {
            const response = await fetch(`${API_BASE}/restaurant/action`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ order_id: orderId, action: action })
            });
            
            if (response.ok) {
                fetchOrders(); // Refresh UI immediately
            }
        } catch (error) {
            alert("Connection error.");
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'partner-login.html';
    }

    setInterval(fetchOrders, 5000);
    window.onload = fetchOrders;
</script>

</body>
</html>
