<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Warangal Eats | Rider App</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .rider-card { background: #2d2d2d; padding: 20px; border-radius: 12px; border-left: 6px solid #60b246; margin-bottom: 15px; }
        .btn-claim { background: #60b246; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .status-badge { background: #444; padding: 5px 10px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Rider Portal 🛵</h1>
    <div id="rider-orders">Searching for ready pickups in Warangal...</div>

    <script>
        const API_URL = 'https://restaurant-app.grayplant-35e8185c.centralus.azurecontainerapps.io';

        async function getDeliveries() {
            try {
                // Riders look for orders that are PREPARING
                const res = await fetch(`${API_URL}/restaurant/manage-orders`); 
                const orders = await res.json();
                const container = document.getElementById('rider-orders');

                if (orders.length === 0) {
                    container.innerHTML = "<p>No orders ready for pickup.</p>";
                    return;
                }

                container.innerHTML = orders.map(o => `
                    <div class="rider-card">
                        <span class="status-badge">READY FOR PICKUP</span>
                        <h3>Order #${o.order_id}</h3>
                        <p>Location: Hanamkonda / Subedari</p>
                        <button class="btn-claim" onclick="claimOrder(${o.order_id})">START DELIVERY</button>
                    </div>
                `).join('');
            } catch (e) { console.log("Waiting for backend..."); }
        }

        async function claimOrder(id) {
            const res = await fetch(`${API_URL}/rider/claim`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ order_id: id, rider_name: "Rajesh - Warangal Express" })
            });
            const data = await res.json();
            alert("Order Claimed! Moving to Out for Delivery.");
            getDeliveries();
        }

        setInterval(getDeliveries, 5000);
        getDeliveries();
    </script>
</body>
</html>
