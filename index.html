<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warangal Eats | Premium Food Delivery</title>
    <style>
        /* --- DARK THEME DESIGN SYSTEM --- */
        :root { 
            --accent-orange: #fc8019; 
            --bg-body: #0a0a0b; 
            --card-bg: #1a1a1c;
            --text-white: #ffffff;
            --text-dim: #93959f;
            --p-green: #60b246; 
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            background: var(--bg-body); 
            color: var(--text-white); 
            padding-bottom: 100px;
        }
        
        /* --- NAVIGATION --- */
        .nav { 
            background: rgba(10, 10, 11, 0.95); 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #2d2d30;
            position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo { 
            font-size: 26px; font-weight: 800; 
            color: var(--accent-orange); cursor: pointer; 
            letter-spacing: -1px;
        }

        .cart-status {
            background: #2d2d30; padding: 8px 15px; border-radius: 8px;
            font-size: 14px; font-weight: bold; cursor: pointer;
        }
        
        .container { padding: 30px 5%; max-width: 1200px; margin: auto; }

        /* --- RESTAURANT GRID --- */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 30px; margin-top: 25px; 
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 20px; overflow: hidden; 
            transition: transform 0.3s ease, box-shadow 0.3s ease; 
            cursor: pointer; border: 1px solid #2d2d30; 
        }

        .card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-color: #444;
        }

        .card-img-wrapper { height: 200px; width: 100%; overflow: hidden; position: relative; }
        
        .card-img { 
            height: 100%; width: 100%; 
            object-fit: cover; 
            transition: transform 0.5s ease;
        }

        .card:hover .card-img { transform: scale(1.1); }

        .card-info { padding: 20px; }
        .res-name { font-size: 20px; font-weight: bold; margin-bottom: 5px; display: block; }
        .res-tags { color: var(--text-dim); font-size: 14px; margin-bottom: 12px; }
        .res-loc { font-size: 13px; color: var(--accent-orange); font-weight: 600; }

        /* --- MENU VIEW --- */
        #menu-view { display: none; }
        .menu-header { margin-bottom: 30px; border-bottom: 1px solid #2d2d30; padding-bottom: 20px; }
        
        .menu-item { 
            display: flex; justify-content: space-between; 
            padding: 25px 0; border-bottom: 1px solid #2d2d30; 
            align-items: center; 
        }

        .btn-add { 
            background: transparent; color: var(--p-green); 
            border: 1px solid var(--p-green); padding: 10px 35px;
            font-weight: 800; cursor: pointer; border-radius: 8px;
            transition: 0.2s;
        }

        .btn-add:hover { background: var(--p-green); color: white; }

        /* --- FLOATING CART & TRACKING --- */
        .cart-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: var(--p-green); color: white; padding: 20px 5%; 
            display: none; justify-content: space-between; 
            font-weight: bold; cursor: pointer; z-index: 1000;
        }

        #tracking-box { 
            display: none; position: fixed; bottom: 20px; right: 20px; width: 340px; 
            background: #1a1a1c; padding: 25px; border-radius: 16px; 
            border: 2px solid var(--accent-orange); box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .progress-bar { background: #333; height: 10px; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        #fill { background: var(--accent-orange); height: 100%; width: 0%; transition: 1.5s ease; }
    </style>
</head>
<body>

<div class="nav">
    <div class="logo" onclick="location.reload()">Warangal Eats</div>
    <div id="user-display" class="cart-status">Hi, Yashwanth</div>
</div>

<div class="container">
    <div id="home-view">
        <h1 style="font-size: 36px; margin-bottom: 8px;">Premium Kitchens</h1>
        <p style="color: var(--text-dim); margin-bottom: 40px;">Direct from Warangal's finest chefs to your doorstep.</p>
        <div id="restaurant-grid" class="grid"></div>
    </div>

    <div id="menu-view">
        <button onclick="showHome()" style="background:none; border:none; color:var(--accent-orange); cursor:pointer; font-weight:bold; margin-bottom:20px;">← BACK TO RESTAURANTS</button>
        <div class="menu-header">
            <h1 id="menu-res-name" style="margin:0">Restaurant Name</h1>
            <p id="menu-res-tags" style="color:var(--text-dim)"></p>
        </div>
        <div id="menu-items"></div>
    </div>
</div>

<div id="cart-bar" class="cart-bar" onclick="placeOrder()">
    <span id="cart-count">0 ITEMS</span>
    <span>CHECKOUT (COD) →</span>
</div>

<div id="tracking-box">
    <h3 style="margin:0">Live Order Tracking</h3>
    <p id="status-text" style="color:var(--accent-orange); font-weight:bold; margin-top:10px;">Connecting...</p>
    <div class="progress-bar"><div id="fill"></div></div>
    <div style="display:flex; justify-content:space-between; font-size:14px;">
        <span>Payment: <b>COD</b></span>
        <span id="order-total-display"></span>
    </div>
</div>

<script>
    const API_BASE = 'https://restaurant-app.grayplant-35e8185c.centralus.azurecontainerapps.io';
    let cart = [];
    let activeResId = null;
    let allRestaurants = [];

    // REAL IMAGE LINKS FOR WARANGAL RESTAURANTS
    const restaurantImages = {
        1: "https://images.unsplash.com/photo-1589302168068-964664d93dc0?q=80&w=1000&auto=format&fit=crop", // Biryani
        2: "https://images.unsplash.com/photo-1633945274405-b6c8069047b0?q=80&w=1000&auto=format&fit=crop", // Mandi
        3: "https://images.unsplash.com/photo-1541014741259-de529411b96a?q=80&w=1000&auto=format&fit=crop"  // Curry
    };

    // 1. Load Restaurants
    async function loadRestaurants() {
        try {
            const res = await fetch(`${API_BASE}/restaurants`);
            allRestaurants = await res.json();
            const grid = document.getElementById('restaurant-grid');
            
            grid.innerHTML = allRestaurants.map(r => `
                <div class="card" onclick="showMenu(${r.id})">
                    <div class="card-img-wrapper">
                        <img src="${restaurantImages[r.id] || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=1000'}" class="card-img" alt="${r.name}">
                    </div>
                    <div class="card-info">
                        <span class="res-name">${r.name}</span>
                        <div class="res-tags">${r.tags.join(' • ')}</div>
                        <div class="res-loc">📍 ${r.location}</div>
                    </div>
                </div>
            `).join('');
        } catch (e) { console.error("API Offline"); }
    }

    // 2. Show Menu
    function showMenu(id) {
        activeResId = id;
        const res = allRestaurants.find(r => r.id === id);
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('menu-view').style.display = 'block';
        document.getElementById('menu-res-name').innerText = res.name;
        document.getElementById('menu-res-tags').innerText = res.tags.join(' • ');

        const items = [
            { name: "Premium Chicken Biryani", price: 280 },
            { name: "Special Mandi Platter", price: 750 },
            { name: "Paneer Butter Masala", price: 210 },
            { name: "Garlic Naan", price: 45 }
        ];

        document.getElementById('menu-items').innerHTML = items.map(i => `
            <div class="menu-item">
                <div>
                    <div style="font-weight:bold; font-size:18px;">${i.name}</div>
                    <div style="color:var(--text-dim)">₹${i.price}</div>
                </div>
                <button class="btn-add" onclick="addToCart('${i.name}', ${i.price})">ADD</button>
            </div>
        `).join('');
        window.scrollTo(0, 0);
    }

    // 3. Cart Logic
    function addToCart(name, price) {
        cart.push({ name, price });
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        document.getElementById('cart-bar').style.display = 'flex';
        document.getElementById('cart-count').innerText = `${cart.length} ITEMS | ₹${total}`;
    }

    // 4. Order & Tracking
    async function placeOrder() {
        const total = cart.reduce((s, i) => s + i.price, 0);
        const name = prompt("Enter Name:", localStorage.getItem('user_name') || "Yashwanth");
        const addr = prompt("Delivery Address:", localStorage.getItem('user_addr') || "Hanamkonda, Warangal");

        if (!name || !addr) return;
        if (!confirm(`Total: ₹${total}\nPayment: Cash on Delivery\n\nPlace Order?`)) return;

        localStorage.setItem('user_name', name);
        localStorage.setItem('user_addr', addr);

        const response = await fetch(`${API_BASE}/orders`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ res_id: activeResId, customer_name: name, address: addr, items: cart, total: total })
        });

        const order = await response.json();
        if (order.order_id) {
            localStorage.setItem('active_order_id', order.order_id);
            startTracking(order.order_id);
        }
    }

    function startTracking(orderId) {
        document.getElementById('cart-bar').style.display = 'none';
        document.getElementById('tracking-box').style.display = 'block';
        
        setInterval(async () => {
            try {
                const res = await fetch(`${API_BASE}/order-status/${orderId}`);
                const data = await res.json();
                
                const statusMap = {
                    'PENDING_RESTAURANT': { text: 'Waiting for Restaurant...', fill: '15%' },
                    'PREPARING': { text: 'Chef is cooking...', fill: '45%' },
                    'READY_FOR_PICKUP': { text: 'Food is packed!', fill: '65%' },
                    'OUT_FOR_DELIVERY': { text: 'Rider is nearby!', fill: '85%' },
                    'DELIVERED': { text: 'Delivered! Enjoy!', fill: '100%' }
                };

                const current = statusMap[data.status] || { text: 'Syncing...', fill: '5%' };
                document.getElementById('status-text').innerText = current.text;
                document.getElementById('fill').style.width = current.fill;
                document.getElementById('order-total-display').innerText = `₹${data.total}`;
            } catch (e) {}
        }, 4000);
    }

    function showHome() {
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('menu-view').style.display = 'none';
    }

    window.onload = () => {
        loadRestaurants();
        const savedOrderId = localStorage.getItem('active_order_id');
        if (savedOrderId) startTracking(savedOrderId);
    };
</script>

</body>
</html>
