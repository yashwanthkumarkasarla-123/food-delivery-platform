<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warangal Eats | Food Delivery</title>
    <style>
        /* --- DESIGN SYSTEM --- */
        :root { 
            --swiggy-orange: #fc8019; 
            --dark-text: #282c3f; 
            --p-green: #60b246; 
            --bg-gray: #f4f7f6;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: var(--bg-gray); 
            color: var(--dark-text); 
            padding-bottom: 80px; /* Space for the floating cart bar */
        }
        
        /* --- NAVIGATION --- */
        .nav { 
            background: white; 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }

        .logo { 
            font-size: 24px; 
            font-weight: bold; 
            color: var(--swiggy-orange); 
            cursor: pointer; 
            letter-spacing: -1px; 
        }
        
        .container { padding: 20px 5%; max-width: 1200px; margin: auto; }

        /* --- RESTAURANT GRID --- */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            margin-top: 20px; 
        }

        .card { 
            background: white; 
            border-radius: 12px; 
            overflow: hidden; 
            transition: 0.3s; 
            cursor: pointer; 
            border: 1px solid #eee; 
        }

        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
        }

        .card-img { 
            height: 160px; 
            background: #e0e0e0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #888; 
            font-size: 40px; 
            font-weight: bold; 
        }

        .card-info { padding: 15px; }

        /* --- MENU VIEW --- */
        #menu-view { display: none; background: white; padding: 30px; border-radius: 12px; min-height: 400px; }
        
        .menu-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 20px 0; 
            border-bottom: 1px solid #f1f1f1; 
            align-items: center; 
        }

        .btn-add { 
            border: 1px solid #bebfc5; 
            background: white; 
            color: var(--p-green); 
            padding: 8px 30px; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 4px; 
        }

        /* --- TRACKING BOX --- */
        #tracking-box { 
            display: none; 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            width: 320px; 
            background: white; 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.15); 
            border-top: 6px solid var(--swiggy-orange); 
            z-index: 2000;
        }

        .progress { background: #eee; height: 10px; border-radius: 5px; margin: 20px 0; overflow: hidden; }
        
        #fill { 
            background: var(--swiggy-orange); 
            height: 100%; 
            width: 0%; 
            transition: 1.5s ease-in-out; 
        }
        
        /* --- CART BAR --- */
        .cart-bar { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: var(--p-green); 
            color: white; 
            padding: 18px 5%; 
            display: none; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer; 
            font-weight: bold; 
            z-index: 1000; 
        }

        /* Live Indicator Animation */
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .live-dot { height: 10px; width: 10px; background: var(--swiggy-orange); border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse 1.5s infinite; }
    </style>
</head>
<body>

<div class="nav">
    <div class="logo" onclick="location.reload()">Warangal Eats</div>
    <div id="user-display" style="font-size: 14px; font-weight: bold; color: #666;"></div>
</div>

<div class="container">
    <div id="home-view">
        <h2 style="font-size: 28px; margin-bottom: 5px;">Warangal's Best Kitchens</h2>
        <p style="color: #666; margin-bottom: 30px;">Choose a restaurant to start your order</p>
        <div id="restaurant-grid" class="grid">Loading available restaurants...</div>
    </div>

    <div id="menu-view">
        <button onclick="showHome()" style="border:none; background:none; color:var(--swiggy-orange); font-weight:bold; cursor:pointer; margin-bottom:25px; font-size: 16px;">← Back to Restaurants</button>
        <h1 id="menu-res-name" style="margin-bottom: 10px;">Menu</h1>
        <div id="menu-items"></div>
    </div>
</div>

<div id="cart-bar" class="cart-bar" onclick="placeOrder()">
    <span id="cart-count">0 Items</span>
    <span>PLACE ORDER (CASH ON DELIVERY) →</span>
</div>

<div id="tracking-box">
    <h3 style="margin:0"><span class="live-dot"></span>Live Tracking</h3>
    <p id="status-text" style="color:var(--swiggy-orange); font-weight:bold; margin-top:10px;">Updating status...</p>
    
    <div class="progress">
        <div id="fill"></div>
    </div>
    
    <div style="display: flex; justify-content: space-between; font-size: 13px; color: #777;">
        <span><strong>Total Amount:</strong></span>
        <span id="order-total-display" style="color: #222; font-weight: bold;"></span>
    </div>
    <p style="font-size: 11px; color: #999; margin-top: 15px; text-align: center; border-top: 1px solid #eee; padding-top: 10px;">Pay the Rider via Cash/UPI on arrival.</p>
</div>

<script>
    // --- 1. CONFIGURATION ---
    const API_BASE = 'https://restaurant-app.grayplant-35e8185c.centralus.azurecontainerapps.io';
    let cart = [];
    let activeResId = null;
    let allRestaurants = [];

    // --- 2. RESTAURANT DATA FETCHING ---
    async function loadRestaurants() {
        try {
            const res = await fetch(`${API_BASE}/restaurants`);
            allRestaurants = await res.json();
            const grid = document.getElementById('restaurant-grid');
            
            grid.innerHTML = allRestaurants.map(r => `
                <div class="card" onclick="showMenu(${r.id})">
                    <div class="card-img">${r.name.charAt(0)}</div>
                    <div class="card-info">
                        <strong style="font-size: 18px;">${r.name}</strong><br>
                        <div style="color:#666; margin: 5px 0; font-size: 13px;">${r.tags.join(' • ')}</div>
                        <div style="font-size: 12px; color: #999;">📍 ${r.location}</div>
                    </div>
                </div>
            `).join('');
        } catch (e) { 
            console.error("API Connection Error");
            document.getElementById('restaurant-grid').innerHTML = "<p>Unable to connect to server. Please try again later.</p>";
        }
    }

    // --- 3. MENU NAVIGATION ---
    function showMenu(id) {
        activeResId = id;
        const res = allRestaurants.find(r => r.id === id);
        
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('menu-view').style.display = 'block';
        document.getElementById('menu-res-name').innerText = res.name;
        
        // Mock items (In a real app, these would come from your database)
        const items = [
            { name: "Special Chicken Biryani", price: 280 },
            { name: "Family Pack Mandi", price: 750 },
            { name: "Paneer Butter Masala", price: 210 },
            { name: "Butter Naan", price: 40 }
        ];

        document.getElementById('menu-items').innerHTML = items.map(i => `
            <div class="menu-item">
                <div><strong>${i.name}</strong><br>₹${i.price}</div>
                <button class="btn-add" onclick="addToCart('${i.name}', ${i.price})">ADD</button>
            </div>
        `).join('');
        window.scrollTo(0, 0);
    }

    // --- 4. CART LOGIC ---
    function addToCart(name, price) {
        cart.push({ name, price });
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        
        document.getElementById('cart-bar').style.display = 'flex';
        document.getElementById('cart-count').innerText = `${cart.length} Item(s) | ₹${total}`;
    }

    // --- 5. ORDER SUBMISSION ---
    async function placeOrder() {
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        
        // Prompt user for details (Simple way to handle checkout for demo)
        const userName = prompt("Enter your name:", localStorage.getItem('user_name') || "Yashwanth");
        const userAddr = prompt("Enter delivery address:", localStorage.getItem('user_addr') || "Hanamkonda, Warangal");

        if (!userName || !userAddr) return;

        // Save to localStorage so user doesn't have to type it next time
        localStorage.setItem('user_name', userName);
        localStorage.setItem('user_addr', userAddr);

        try {
            const response = await fetch(`${API_BASE}/orders`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    res_id: activeResId,
                    customer_name: userName,
                    address: userAddr,
                    items: cart,
                    total: total
                })
            });

            const order = await response.json();
            if (order.order_id) {
                // Save active order ID to keep tracking active after page refresh
                localStorage.setItem('active_order_id', order.order_id);
                cart = []; // Reset local cart
                startTracking(order.order_id);
            }
        } catch (e) {
            alert("Failed to place order. Check your internet connection.");
        }
    }

    // --- 6. POLLING & TRACKING LOGIC ---
    function startTracking(orderId) {
        // Reset UI to show Home and the Tracking Widget
        document.getElementById('cart-bar').style.display = 'none';
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('menu-view').style.display = 'none';
        document.getElementById('tracking-box').style.display = 'block';
        
        // Poll the server every 4 seconds for status updates
        const pollInterval = setInterval(async () => {
            try {
                const res = await fetch(`${API_BASE}/order-status/${orderId}`);
                const data = await res.json();
                
                // Map Backend statuses to UI messages and Progress bar width
                const statusMap = {
                    'PENDING_RESTAURANT': { text: 'Waiting for restaurant...', fill: '15%', color: '#fc8019' },
                    'PREPARING': { text: 'Kitchen is preparing food...', fill: '45%', color: '#fc8019' },
                    'READY_FOR_PICKUP': { text: 'Food ready! Finding rider...', fill: '65%', color: '#fc8019' },
                    'OUT_FOR_DELIVERY': { text: 'Rider is on the way!', fill: '85%', color: '#60b246' },
                    'DELIVERED': { text: 'Order Delivered! (Paid COD)', fill: '100%', color: '#60b246' },
                    'REJECTED': { text: 'Order was rejected by kitchen.', fill: '0%', color: 'red' }
                };

                const current = statusMap[data.status] || { text: 'Processing...', fill: '5%', color: '#fc8019' };
                
                // Update UI elements
                document.getElementById('status-text').innerText = current.text;
                document.getElementById('status-text').style.color = current.color;
                document.getElementById('fill').style.width = current.fill;
                document.getElementById('fill').style.background = current.color;
                document.getElementById('order-total-display').innerText = `₹${data.total}`;

                // Handle terminal states (End polling)
                if (data.status === 'DELIVERED' || data.status === 'REJECTED') {
                    clearInterval(pollInterval);
                    setTimeout(() => {
                        localStorage.removeItem('active_order_id');
                        if (data.status === 'REJECTED') {
                            alert("Sorry, the restaurant cannot take your order right now.");
                            document.getElementById('tracking-box').style.display = 'none';
                        }
                    }, 5000);
                }
            } catch (e) { 
                console.log("Syncing with server..."); 
            }
        }, 4000);
    }

    function showHome() {
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('menu-view').style.display = 'none';
    }

    // --- 7. ON PAGE LOAD ---
    window.onload = () => {
        loadRestaurants();
        
        // Resume tracking if there's an active order in localStorage
        const savedOrderId = localStorage.getItem('active_order_id');
        if (savedOrderId) startTracking(savedOrderId);

        // Display user name if available
        const savedName = localStorage.getItem('user_name');
        if (savedName) document.getElementById('user-display').innerText = `Hi, ${savedName}`;
    };
</script>

</body>
</html>
