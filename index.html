<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiggy Warangal - Zero Delivery Cost</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --swiggy-orange: #fc8019; --text-main: #282c3f; --text-sub: #686b78; }
        body { font-family: 'Outfit', sans-serif; margin: 0; background-color: #f0f0f0; color: var(--text-main); }
        
        /* Navbar */
        nav { padding: 15px 10%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 15px 40px -20px rgba(40,44,63,.15); position: sticky; top: 0; background: white; z-index: 1000; }
        .logo { color: var(--swiggy-orange); font-size: 24px; font-weight: 800; text-transform: uppercase; cursor: pointer; }

        .container { max-width: 1200px; margin: 30px auto; display: flex; gap: 20px; padding: 0 20px; }
        
        /* Restaurant Grid */
        .main-content { flex: 3; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 32px; }
        
        /* Card Styling */
        .card { background: white; transition: transform 0.2s; cursor: pointer; border-radius: 16px; overflow: hidden; padding-bottom: 10px; }
        .card:hover { transform: scale(0.96); }
        .img-container { width: 100%; height: 180px; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Cart Sidebar */
        .cart-sidebar { flex: 1; background: white; padding: 20px; border-radius: 16px; height: fit-content; position: sticky; top: 100px; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        
        .swiggy-btn { background: var(--swiggy-orange); color: white; border: none; padding: 12px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 15px; border-radius: 8px; }
        .rating-badge { background: #48c479; color: white; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
        
        /* Review Modal */
        #review-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 16px; box-shadow: 0 0 100px rgba(0,0,0,0.5); z-index: 2000; text-align: center; }
    </style>
</head>
<body>

<nav>
    <div class="logo">Warangal Eats</div>
    <div id="user-status">Welcome, Guest</div>
</nav>

<div class="container">
    <div class="main-content">
        <h2>Top Restaurants in Warangal</h2>
        <div class="grid" id="restaurant-list">
            <p>Fetching fresh food for you...</p>
        </div>
    </div>

    <div class="cart-sidebar" id="cart">
        <h3>Your Cart</h3>
        <div id="cart-items">
            <p style="color: gray;">Your cart is empty.</p>
        </div>
        <hr>
        <div class="payment-methods">
            <p><strong>Payment Method:</strong></p>
            <label><input type="radio" name="payment" value="COD" checked> Cash on Delivery (COD)</label>
