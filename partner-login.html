<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Login | Warangal Eats</title>
    <style>
        :root { 
            --swiggy-orange: #fc8019; 
            --dark-blue: #282c3f; 
            --text-gray: #686b78;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--dark-blue); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
        }

        .login-card {
            background: white; padding: 40px; border-radius: 16px;
            width: 100%; max-width: 360px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .logo { 
            color: var(--swiggy-orange); 
            font-size: 32px; 
            font-weight: 800; 
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        h2 { margin: 0; color: var(--dark-blue); font-size: 20px; }
        p { color: var(--text-gray); font-size: 14px; margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 12px; font-weight: bold; color: var(--text-gray); text-transform: uppercase; margin-bottom: 5px; display: block; }

        input {
            width: 100%; padding: 14px; 
            border: 1px solid #d4d5d9; border-radius: 8px; box-sizing: border-box;
            font-size: 16px; outline: none; transition: 0.2s;
        }

        input:focus { border-color: var(--swiggy-orange); }

        .btn-login {
            width: 100%; padding: 15px; background: var(--swiggy-orange);
            color: white; border: none; border-radius: 8px;
            font-weight: bold; font-size: 16px; cursor: pointer; 
            transition: 0.3s; margin-top: 10px;
        }

        .btn-login:hover { background: #e67316; transform: translateY(-2px); }
        .btn-login:active { transform: translateY(0); }

        .demo-box {
            background: #f4f7f6; border-radius: 8px; padding: 15px;
            margin-top: 25px; text-align: left; border: 1px dashed #ccc;
        }

        .demo-box strong { font-size: 12px; color: var(--dark-blue); }
        .demo-list { font-size: 12px; color: var(--text-gray); margin-top: 5px; line-height: 1.6; }
        
        .error-msg { color: #ff4757; font-size: 12px; margin-top: -10px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">Warangal Eats</div>
    <h2>Partner Central</h2>
    <p>Please enter your credentials to manage orders.</p>
    
    <div class="input-group">
        <label>Restaurant ID</label>
        <input type="number" id="res-id-input" placeholder="Enter ID (e.g. 1)" autofocus>
    </div>

    <div class="input-group">
        <label>Access Code</label>
        <input type="password" id="pass-input" placeholder="••••••••">
    </div>

    <div id="error-box" class="error-msg">Invalid ID or Access Code</div>

    <button class="btn-login" id="login-btn" onclick="handleLogin()">LOGIN TO DASHBOARD</button>

    <div class="demo-box">
        <strong>DEMO ACCOUNTS (Use any ID):</strong>
        <div class="demo-list">
            1 • Raiyaan's Hotel (Subedari)<br>
            2 • Mandi.com (Hanamkonda)<br>
            3 • Kritunga Restaurant (Naimnagar)
        </div>
    </div>
</div>

<script>
    function handleLogin() {
        const id = document.getElementById('res-id-input').value;
        const pass = document.getElementById('pass-input').value;
        const btn = document.getElementById('login-btn');
        const errorBox = document.getElementById('error-box');

        // Simple Validation
        if (!id) {
            alert("Please enter a Restaurant ID");
            return;
        }

        // Visual feedback
        btn.innerText = "VERIFYING...";
        btn.style.opacity = "0.7";

        // Map IDs to Names for a personalized dashboard experience
        const names = {
            "1": "Raiyaan's Hotel",
            "2": "Mandi.com",
            "3": "Kritunga Restaurant"
        };

        // Simulated login delay
        setTimeout(() => {
            const resName = names[id];
            
            if (resName) {
                // Success! Store info for the dashboard
                localStorage.setItem('active_res_id', id);
                localStorage.setItem('active_res_name', resName);
                
                // Redirect to partner.html
                window.location.href = `partner.html?res_id=${id}`;
            } else {
                // Failure
                btn.innerText = "LOGIN TO DASHBOARD";
                btn.style.opacity = "1";
                errorBox.style.display = "block";
                errorBox.innerText = "ID not recognized in our Warangal network.";
            }
        }, 8000); // 0.8s fake loading
    }

    // Allow "Enter" key to trigger login
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') handleLogin();
    });
</script>

</body>
</html>
