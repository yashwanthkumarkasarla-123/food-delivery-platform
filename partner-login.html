<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Login | Warangal Eats</title>
    <style>
        :root {
            --partner-green: #003d29;
            --swiggy-orange: #fc8019;
            --error-red: #d9534f;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .brand {
            font-size: 28px;
            font-weight: 800;
            color: var(--partner-green);
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--partner-green);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .error-box {
            background: #ffecec;
            color: var(--error-red);
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #f5c6cb;
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="login-container">
    <div class="brand">Warangal Eats</div>
    <div class="subtitle">PARTNER PORTAL</div>

    <div id="error-message" class="error-box"></div>

    <div class="form-group">
        <label>RESTAURANT ID</label>
        <input type="text" id="res-id" placeholder="e.g. KRITUNGA01" autocomplete="off">
    </div>

    <div class="form-group">
        <label>PASSWORD</label>
        <input type="password" id="res-pass" placeholder="••••••••">
    </div>

    <button id="login-btn" onclick="attemptLogin()">
        <span id="btn-text">LOGIN TO DASHBOARD</span>
        <div id="btn-spinner" class="spinner"></div>
    </button>

    <p style="margin-top: 20px; font-size: 11px; color: #999;">
        Credentials Hint: Use <b>KRITUNGA01</b> or <b>RAIYAAN01</b> with <b>warangal123</b>
    </p>
</div>

<script>
    function attemptLogin() {
        const idInput = document.getElementById('res-id');
        const passInput = document.getElementById('res-pass');
        const errorBox = document.getElementById('error-message');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');

        errorBox.style.display = 'none';
        
        if (!idInput.value || !passInput.value) {
            errorBox.innerText = "Please fill in all fields.";
            errorBox.style.display = 'block';
            return;
        }

        btnText.style.display = 'none';
        btnSpinner.style.display = 'block';

        // Simulated Database Check
        setTimeout(() => {
            const partnerAccounts = {
                "RAIYAAN01": { id: 1, pass: "warangal123", name: "Raiyaan's Hotel" },
                "MANDI01":   { id: 2, pass: "warangal123", name: "Mandi.com" },
                "KRITUNGA01": { id: 3, pass: "warangal123", name: "Kritunga Restaurant" },
                "SUPRABHA01": { id: 4, pass: "warangal123", name: "Suprabha Hotel" }
            };

            const user = idInput.value.toUpperCase();
            const pass = passInput.value;

            if (partnerAccounts[user] && partnerAccounts[user].pass === pass) {
                // Success: Store specific restaurant details
                localStorage.setItem('isPartnerLoggedIn', 'true');
                localStorage.setItem('res_id', partnerAccounts[user].id);
                localStorage.setItem('activeRestaurant', partnerAccounts[user].name);
                
                // Redirect with the ID in the URL for the dashboard to use
                window.location.href = `partner.html?res_id=${partnerAccounts[user].id}`;
            } else {
                // Failure
                btnText.style.display = 'block';
                btnSpinner.style.display = 'none';
                errorBox.innerText = "Invalid credentials. Access Denied.";
                errorBox.style.display = 'block';
            }
        }, 1200);
    }

    // Support for Enter key
    document.addEventListener('keypress', (e) => { if(e.key === 'Enter') attemptLogin(); });
</script>

</body>
</html>
