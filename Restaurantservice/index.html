<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warangal Eats 🚀</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-orange-500 p-4 text-white text-center text-2xl font-bold shadow-lg">
        Warangal Eats 🍛
    </nav>

    <div class="container mx-auto p-6">
        <h2 class="text-xl font-semibold mb-4 text-gray-700">Restaurants near you in Warangal</h2>
        
        <div id="restaurant-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p id="loading">Finding the best biryani near you...</p>
        </div>
    </div>

    <script>
        async function loadRestaurants() {
            try {
                // Replace with your actual live Azure URL
                const response = await fetch('https://restaurant-app.grayplant-35e8185c.centralus.azurecontainerapps.io/restaurants');
                const data = await response.json();
                
                const container = document.getElementById('restaurant-list');
                const loading = document.getElementById('loading');
                loading.style.display = 'none';

                data.forEach(res => {
                    container.innerHTML += `
                        <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-shadow duration-300">
                            <div class="p-5">
                                <div class="flex justify-between items-center">
                                    <h3 class="text-lg font-bold text-gray-800">${res.name}</h3>
                                    <span class="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded">⭐ ${res.rating}</span>
                                </div>
                                <p class="text-gray-500 text-sm mt-1">📍 ${res.location}</p>
                                <div class="mt-3 flex flex-wrap gap-2">
                                    ${res.tags.map(tag => `<span class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-full">${tag}</span>`).join('')}
                                </div>
                                <button class="w-full mt-4 bg-orange-500 text-white font-bold py-2 rounded-lg hover:bg-orange-600">Order Now</button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Failed to load restaurants:", error);
            }
        }

        // Call the function when the page loads
        window.onload = loadRestaurants;
    </script>
</body>
</html>
